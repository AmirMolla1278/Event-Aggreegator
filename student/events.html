<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Events</title>
    <link rel="stylesheet" href="../css/events.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <h2>UEAS</h2>
        <ul>
          <li>
            <i class="fa fa-home"></i> <a href="dashboard.html">Dashboard</a>
          </li>
          <li>
            <i class="fa fa-calendar"></i> <a href="events.html">Events</a>
          </li>
          <li class="active">
            <i class="fa fa-bell"></i>
            <a href="notifications.html">Notifications</a>
          </li>
          <li>
            <i class="fa fa-star"></i>
            <a href="subscriptions.html">Subscriptions</a>
          </li>
          <li><i class="fa fa-user"></i> Profile</li>
          <li>
            <i class="fa fa-star"></i>
            <a href="../auth/login.html">Log <output></output></a>
          </li>
        </ul>
      </aside>
      <!-- Main Content -->
      <main class="main">
        <!-- Header -->
        <header class="header">
          <h1>Explore Events</h1>
          <div class="search-bar">
            <input type="text" placeholder="Search events..." />
            <i class="fa fa-search"></i>
          </div>
        </header>

        <!-- Filters -->
        <section class="filters">
          <select>
            <option>Category</option>
            <option>Workshop</option>
            <option>Seminar</option>
            <option>Competition</option>
          </select>
          <select>
            <option>Department</option>
            <option>CSE</option>
            <option>EEE</option>
          </select>
          <input type="date" />
          <button class="btn-filter">Apply</button>
        </section>
        <!-- Event Grid -->
        <section class="event-grid">
          <div class="event-card">
            <img src="../assets/images/event1.jpg" alt="event" />
            <div class="event-content">
              <h3>AI Bootcamp</h3>
              <p>CSE Dept • May 5</p>
              <button> <a href="event-details.html">View Details</a></button>
            </div>
          </div>

          <div class="event-card">
            <img src="../assets/images/event2.jpg" alt="event" />
            <div class="event-content">
              <h3>Startup Meetup</h3>
              <p>Business Club • May 10</p>
              <button>
                View Details
              </button>
            </div>
          </div>

          <div class="event-card">
            <img src="../assets/images/event3.jpg" alt="event" />
            <div class="event-content">
              <h3>Cyber Security Talk</h3>
              <p>ICT Club • May 12</p>
              <button>View Details</button>
            </div>
          </div>
        </section>
        <!-- Pagination -->
        <div class="pagination">
          <button>Prev</button>
          <span>1</span>
          <span>2</span>
          <span>3</span>
          <button>Next</button>
        </div>
      </main>
    </div>
  </body>
</html>
